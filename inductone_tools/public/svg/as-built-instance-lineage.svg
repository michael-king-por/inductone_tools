<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="660" viewBox="0 0 1440 660" role="img" aria-labelledby="title desc">
  <title id="title">As-Built and Instance Lineage</title>
  <desc id="desc">Builder completion evidence is reviewed and accepted into a locked As-Built Record and an InductOne Instance with copied component serial rows.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#25313c" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 z" fill="#3c4447"/>
    </marker>
    <style>
      .title { font-family:"Segoe UI",Arial,sans-serif; font-size:32px; font-weight:800; fill:#25313c; }
      .sub { font-family:"Segoe UI",Arial,sans-serif; font-size:15px; fill:#64717c; }
      .card { fill:#fff; stroke:#d9e5ec; stroke-width:1.4; filter:url(#shadow); }
      .artifact { fill:#f8f5ff; stroke:#b9a8ef; stroke-width:1.4; filter:url(#shadow); }
      .gate { fill:#fff8e8; stroke:#f0ad2e; stroke-width:1.8; filter:url(#shadow); }
      .label { font-family:"Segoe UI",Arial,sans-serif; font-size:20px; font-weight:800; fill:#25313c; }
      .small { font-family:"Segoe UI",Arial,sans-serif; font-size:14px; fill:#52616b; }
      .mono { font-family:"Cascadia Mono","Consolas",monospace; font-size:12px; fill:#52616b; }
      .arrow { fill:none; stroke:#3c4447; stroke-width:3; marker-end:url(#arrow); }
      .rail { fill:none; stroke:#1794ce; stroke-width:3; stroke-dasharray:8 8; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="1440" height="660" fill="#fbfdff"/>
  <text x="70" y="70" class="title">As-Built and Instance Lineage</text>
  <text x="70" y="100" class="sub">Acceptance is the custody break: builder-submitted evidence becomes locked system truth and lifecycle instance data.</text>

  <rect x="70" y="170" width="250" height="145" rx="22" class="card"/>
  <text x="96" y="215" class="label">Release workbook</text>
  <text x="96" y="245" class="small">Generated at release.</text>
  <text x="96" y="270" class="small">Pre-filled with IND serial.</text>
  <text x="96" y="294" class="mono">Builder input artifact</text>

  <rect x="410" y="170" width="250" height="145" rx="22" class="card"/>
  <text x="436" y="215" class="label">Build Completion</text>
  <text x="436" y="245" class="small">Workbook uploaded.</text>
  <text x="436" y="270" class="small">Serial rows parsed.</text>
  <text x="436" y="294" class="mono">Submitted → Reviewed</text>

  <polygon points="790,160 930,242 790,324 650,242" class="gate"/>
  <text x="790" y="232" class="label" text-anchor="middle">Ops review</text>
  <text x="790" y="258" class="small" text-anchor="middle">serial rows required</text>

  <rect x="1010" y="170" width="250" height="145" rx="22" class="artifact"/>
  <text x="1036" y="215" class="label">As-Built Record</text>
  <text x="1036" y="245" class="small">Created on acceptance.</text>
  <text x="1036" y="270" class="small">Locked after creation.</text>
  <text x="1036" y="294" class="mono">Accepted system evidence</text>

  <rect x="1010" y="405" width="250" height="145" rx="22" class="artifact"/>
  <text x="1036" y="450" class="label">InductOne Instance</text>
  <text x="1036" y="480" class="small">Named by IND serial.</text>
  <text x="1036" y="505" class="small">Carries component serials.</text>
  <text x="1036" y="529" class="mono">Ready for Ship → Installed</text>

  <rect x="70" y="405" width="590" height="145" rx="22" fill="#e8f6ff" stroke="#b9dff2" filter="url(#shadow)"/>
  <text x="96" y="450" class="label">Audit fields that must survive</text>
  <text x="96" y="480" class="small">Build, Configuration Order, Snapshot, BOM Export Package, Build Completion, As-Built, Instance.</text>
  <text x="96" y="505" class="small">Component serial rows are copied to the Instance so support does not depend on reopening the completion workbook.</text>
  <text x="96" y="529" class="mono">Validation: lifecycle smoke + serial-copy assertion</text>

  <path class="arrow" d="M320 242 C355 242 375 242 410 242"/>
  <path class="arrow" d="M660 242 C690 242 710 242 650 242"/>
  <path class="arrow" d="M930 242 C965 242 975 242 1010 242"/>
  <path class="arrow" d="M1135 315 L1135 405"/>
  <path class="rail" d="M660 478 C765 478 875 478 1010 478"/>
  <text x="835" y="462" class="small" text-anchor="middle">component serial rows copied</text>
</svg>
