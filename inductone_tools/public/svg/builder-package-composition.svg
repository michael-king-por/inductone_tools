<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="640" viewBox="0 0 1440 640" role="img" aria-labelledby="title desc">
  <title id="title">Builder Package Composition</title>
  <desc id="desc">The Configuration Order is the package index. Configuration-derived documents vary by build; part documentation payload is generated from the BOM Export Package.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#25313c" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 z" fill="#3c4447"/>
    </marker>
    <style>
      .title { font-family:"Segoe UI",Arial,sans-serif; font-size:32px; font-weight:800; fill:#25313c; }
      .sub { font-family:"Segoe UI",Arial,sans-serif; font-size:15px; fill:#64717c; }
      .card { fill:#fff; stroke:#d9e5ec; stroke-width:1.4; filter:url(#shadow); }
      .blue { fill:#e8f6ff; stroke:#94d0ed; }
      .amber { fill:#fff8e8; stroke:#f0ad2e; }
      .green { fill:#ecfff6; stroke:#82d7ad; }
      .label { font-family:"Segoe UI",Arial,sans-serif; font-size:20px; font-weight:800; fill:#25313c; }
      .small { font-family:"Segoe UI",Arial,sans-serif; font-size:14px; fill:#52616b; }
      .mono { font-family:"Cascadia Mono","Consolas",monospace; font-size:12px; fill:#52616b; }
      .arrow { fill:none; stroke:#3c4447; stroke-width:3; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="1440" height="640" fill="#fbfdff"/>
  <text x="70" y="70" class="title">Builder Handoff Package</text>
  <text x="70" y="100" class="sub">The Configuration Order is the index. It points to each generated artifact instead of hiding the workflow in an opaque ZIP.</text>

  <rect x="90" y="220" width="300" height="180" rx="24" class="card blue"/>
  <text x="120" y="268" class="label">Configuration Order</text>
  <text x="120" y="302" class="small">Build basis, selected options, serial, builder, and document index.</text>
  <text x="120" y="352" class="mono">CO status: Draft → Released → Awaiting Completion → Closed</text>

  <rect x="520" y="120" width="320" height="150" rx="24" class="card amber"/>
  <text x="550" y="168" class="label">Configuration-derived</text>
  <text x="550" y="202" class="small">Snapshot hierarchy workbook</text>
  <text x="550" y="226" class="small">Configuration Order print/PDF</text>
  <text x="550" y="250" class="mono">Expected to vary by option set</text>

  <rect x="520" y="355" width="320" height="150" rx="24" class="card green"/>
  <text x="550" y="403" class="label">Part documentation</text>
  <text x="550" y="437" class="small">Watermarked PDFs, drawings, selected item attachments.</text>
  <text x="550" y="485" class="mono">Generated by BOM Export Package</text>

  <rect x="975" y="220" width="330" height="180" rx="24" class="card"/>
  <text x="1005" y="268" class="label">Builder Portal</text>
  <text x="1005" y="302" class="small">Assigned external builder sees only scoped handoff records and generated package artifacts.</text>
  <text x="1005" y="352" class="mono">No raw Item / BOM / Sales Order access</text>

  <path class="arrow" d="M390 310 C455 310 455 195 520 195"/>
  <path class="arrow" d="M390 310 C455 310 455 430 520 430"/>
  <path class="arrow" d="M840 195 C900 195 925 262 975 285"/>
  <path class="arrow" d="M840 430 C900 430 925 358 975 335"/>

  <rect x="90" y="535" width="1215" height="48" rx="16" fill="#f8f9fa" stroke="#d9e5ec"/>
  <text x="120" y="565" class="small">Validation split: hierarchy workbook differences prove configuration effects; package manifest verifies part-documentation payload stability or surfaces a finding.</text>
</svg>
