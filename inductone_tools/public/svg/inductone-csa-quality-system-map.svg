<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">InductOne CSA Quality System Map</title>
  <desc id="desc">A visual map showing how controlled CSA documents connect to ERPNext records from design intent through builder handoff, as-built acceptance, and as-maintained field changes.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1794CE"/>
      <stop offset="1" stop-color="#0B5E89"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16B3A3"/>
      <stop offset="1" stop-color="#087F73"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#101828" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667085"/>
    </marker>
    <style>
      .bg { fill:#F8FAFC; }
      .card { fill:#FFFFFF; stroke:#D0D5DD; stroke-width:1.5; filter:url(#shadow); }
      .soft { fill:#F2F4F7; stroke:#D0D5DD; stroke-width:1.2; }
      .title { font:700 30px Arial, Helvetica, sans-serif; fill:#101828; }
      .subtitle { font:400 15px Arial, Helvetica, sans-serif; fill:#475467; }
      .h { font:700 16px Arial, Helvetica, sans-serif; fill:#101828; }
      .small { font:400 12px Arial, Helvetica, sans-serif; fill:#475467; }
      .tiny { font:700 11px Arial, Helvetica, sans-serif; fill:#667085; letter-spacing:.04em; }
      .white { fill:#FFFFFF; }
      .line { stroke:#667085; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .dash { stroke:#98A2B3; stroke-width:2; stroke-dasharray:7 7; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>

  <text x="52" y="58" class="title">InductOne CSA Quality System</text>
  <text x="52" y="84" class="subtitle">Controlled documents define the rules. ERPNext records execute and preserve the configuration status accounting trail.</text>

  <rect x="50" y="118" width="258" height="500" rx="18" class="card"/>
  <rect x="50" y="118" width="258" height="58" rx="18" fill="url(#blue)"/>
  <text x="74" y="153" class="h white">Controlled source layer</text>
  <text x="74" y="205" class="tiny">PLAN / POLICY</text>
  <text x="74" y="229" class="small">OPS-CSA-PLN-001</text>
  <text x="74" y="248" class="small">OPS-SER-POL-001</text>
  <text x="74" y="285" class="tiny">PROCEDURES</text>
  <text x="74" y="309" class="small">Configuration model</text>
  <text x="74" y="328" class="small">Deviation / waiver</text>
  <text x="74" y="347" class="small">Configuration audit</text>
  <text x="74" y="366" class="small">Labeling + builder serialization</text>
  <text x="74" y="406" class="tiny">REGISTERS / TEMPLATES</text>
  <text x="74" y="430" class="small">Option Matrix, CI Index</text>
  <text x="74" y="449" class="small">Serialized Prefix Register</text>
  <text x="74" y="468" class="small">Builder Completion Workbook</text>
  <text x="74" y="487" class="small">FCO forms and register</text>
  <text x="74" y="542" class="tiny">FUTURE LINKS</text>
  <text x="74" y="566" class="small">SharePoint release locations</text>
  <text x="74" y="585" class="small">inserted after EC release</text>

  <rect x="380" y="120" width="850" height="500" rx="18" class="card"/>
  <rect x="410" y="158" width="180" height="86" rx="14" class="soft"/>
  <text x="430" y="188" class="h">Design intent</text>
  <text x="430" y="212" class="small">BOMs, items, product</text>
  <text x="430" y="229" class="small">bundles, options</text>

  <rect x="650" y="158" width="210" height="86" rx="14" class="soft"/>
  <text x="670" y="188" class="h">As-designed baseline</text>
  <text x="670" y="212" class="small">Configured BOM Snapshot</text>
  <text x="670" y="229" class="small">+ Configuration Order</text>

  <rect x="925" y="158" width="250" height="86" rx="14" class="soft"/>
  <text x="945" y="188" class="h">Released builder package</text>
  <text x="945" y="212" class="small">BOM export ZIP, manifest,</text>
  <text x="945" y="229" class="small">balloon report, completion form</text>

  <rect x="410" y="332" width="210" height="96" rx="14" class="soft"/>
  <text x="430" y="363" class="h">Builder completion</text>
  <text x="430" y="387" class="small">Workbook upload, serials,</text>
  <text x="430" y="404" class="small">label evidence, review gate</text>

  <rect x="690" y="332" width="210" height="96" rx="14" class="soft"/>
  <text x="710" y="363" class="h">As-built acceptance</text>
  <text x="710" y="387" class="small">As-Built Record +</text>
  <text x="710" y="404" class="small">InductOne Instance</text>

  <rect x="965" y="332" width="210" height="96" rx="14" class="soft"/>
  <text x="985" y="363" class="h">As-maintained</text>
  <text x="985" y="387" class="small">FCOs, deviations,</text>
  <text x="985" y="404" class="small">audit corrections</text>

  <path d="M590 201 H640" class="line"/>
  <path d="M860 201 H914" class="line"/>
  <path d="M1050 244 V318" class="line"/>
  <path d="M925 380 H910" class="line"/>
  <path d="M690 380 H630" class="line"/>
  <path d="M515 332 V258 H650" class="dash"/>
  <path d="M795 428 V514 H475 V244" class="dash"/>

  <rect x="410" y="494" width="765" height="76" rx="14" fill="#ECFDF3" stroke="#ABEFC6" stroke-width="1.5"/>
  <text x="432" y="524" class="h">Audit loop</text>
  <text x="432" y="548" class="small">Quarterly CSA audit compares physical labels and returned builder evidence to ERPNext CSA records. Mismatches become data corrections, FCOs, or Engineering Change actions.</text>

  <path d="M308 360 H370" class="line"/>
  <text x="326" y="344" class="tiny">GOVERNS</text>
</svg>
